<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15 18" width="256" height="256" shape-rendering="crispEdges">
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <g id="master-group">
    <!-- 贝壳浅白色边框底层 -->
    <g id="shell-outline-group" fill="#f2f8ff">
      <rect id="shell-head-outline" x="3.95" y="4.95" width="7.1" height="1.1"/>
      <rect id="shell-neck-outline" x="2.95" y="5.95" width="9.1" height="1.1"/>
      <rect id="shell-body-outline" x="1.95" y="6.95" width="11.1" height="6.1"/>
    </g>

    <g id="shell-color-group" fill="#00b3ff">
      <!-- 贝壳顶部（向下延伸1px与neck重叠） -->
      <rect id="shell-head" x="4" y="5" width="7" height="1"/>
      <rect id="shell-neck" x="3" y="6" width="9" height="1"/>

      <!-- 贝壳主体（height=6，底部只到y=11） -->
      <rect id="shell-body" x="2" y="7" width="11" height="6"/>

      <!-- 贝壳侧翅 -->
      <rect id="left-wing" x="0" y="9" width="1.5" height="1.5"/>
      <rect id="right-wing" x="13.5" y="9" width="1.5" height="1.5"/>
    </g>

    <g id="limb-color-group" fill="#00b3ff">
      <!-- 小短足 -->
      <rect id="left-foot" x="4" y="13" width="1.5" height="1.5"/>
      <rect id="right-foot" x="9.5" y="13" width="1.5" height="1.5"/>
    </g>

    <!-- 左右眼睛 -->
    <g id="eyes-color-group" fill="#000000">
      <rect id="left-eye" x="4" y="8" width="1.5" height="2.5"/>
      <rect id="right-eye" x="9.5" y="8" width="1.5" height="2.5"/>
    </g>

    <!-- 眼睛高光 -->
    <g id="eye-highlight-group" fill="#ffffff" opacity="0.8">
      <rect id="left-eye-highlight" x="4.75" y="8" width="0.5" height="0.75"/>
      <rect id="right-eye-highlight" x="10.25" y="8" width="0.5" height="0.75"/>
    </g>
  </g>
</svg>
